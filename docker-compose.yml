services:
  unweaver-stub:
    build: ./unweaver_stub
    container_name: aichair-unweaver-stub

  api:
    build: ./api
    container_name: aichair-api
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      UNWEAVER_URL: http://unweaver-stub:8000
    depends_on:
      - unweaver-stub
